<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="飲み会や宅のみの会話ネタを提供するサイト">
    <title>会話ネタジェネレーター - Conversation Starter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="header-main">
                <h1 class="logo">🎉 会話ネタジェネレーター</h1>
                <p class="tagline">飲み会や宅のみで話題に困ったときに！</p>
            </div>
            <a href="https://github.com/mikosun/MedachitaGirl" target="_blank" rel="noopener noreferrer" class="github-link" title="GitHub リポジトリを開く">
                <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="main-container">
            <!-- メインコンテンツエリア -->
            <div class="topic-display" id="topicDisplay">
                <p class="hint">ボタンを押して質問をゲット！</p>
            </div>

            <!-- ボタンセクション -->
            <div class="button-section">
                <button class="generate-btn" id="generateBtn">🎲 質問をもらう</button>
                <button class="retry-btn" id="retryBtn" style="display: none;">別の質問をもらう</button>
            </div>

            <!-- カテゴリーフィルター -->
            <div class="category-filter">
                <label>
                    <input type="checkbox" name="category" value="deep" checked>
                    深い話題
                </label>
                <label>
                    <input type="checkbox" name="category" value="fun" checked>
                    楽しい話題
                </label>
                <label>
                    <input type="checkbox" name="category" value="icebreaker" checked>
                    アイスブレイク
                </label>
            </div>

            <!-- 履歴セクション -->
            <div class="history-section">
                <h3>📝 この会話で出た質問</h3>
                <div class="history-list" id="historyList">
                    <p class="empty-message">まだ質問がありません</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 会話ネタジェネレーター. 楽しい会話を！</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
